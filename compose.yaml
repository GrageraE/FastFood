services:
  elasticsearch:
    image: 'elasticsearch:7.17.10'
    environment:
      - 'ELASTIC_PASSWORD=secret'
      - 'discovery.type=single-node'
      - 'xpack.security.enabled=false'
    ports:
      - '9200'
      - '9300'
  mongodb:
    image: 'mongo:latest'
    environment:
      - 'MONGO_INITDB_DATABASE=fastfood'
      - 'MONGO_INITDB_ROOT_PASSWORD=secret'
      - 'MONGO_INITDB_ROOT_USERNAME=root'
    ports:
      - '27017'
  compass:
    image: 'haohanyang/compass-web'
    environment:
      - 'CW_MONGO_URI=mongodb://root:secret@127.0.0.1/fastfood'
    depends_on:
      - 'mongo'
    ports:
      - '8081:8080'
    links:
      - 'mongo'
